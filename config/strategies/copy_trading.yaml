# KongTrade Copy-Trading Strategy Configuration
# Editierbar ohne Code-Änderung — Bot-Neustart erforderlich für Reload.
#
# wallet_multipliers: Kapital-Multiplikator pro Wallet (0.1 = 10% von COPY_SIZE_MULTIPLIER)
# wallet_categories:  Spezialisierungs-Filter — Wallet wird nur in diesen Märkten kopiert
#                     "broad" = kein Filter (handelt alles)
# wallet_names:       Lesbare Namen für Logs und Telegram-Alerts
#
# Env-Vars überschreiben diese Werte zur Laufzeit (WALLET_WEIGHTS als JSON).

# ---------------------------------------------------------------------------
# Aggregations-Parameter
# ---------------------------------------------------------------------------
aggregation:
  window_s: 60
  multi_signal_multipliers:
    1: 1.0
    2: 1.5
    3: 2.0
  herd_fraction: 0.50
  early_entry_multiplier: 1.5
  early_entry_volume_usd: 10000

